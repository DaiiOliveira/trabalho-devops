apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: order-rabbitmq-dev-data
  labels:
    app: order-rabbitmq-dev
    environment: dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: order-rabbitmq-dev
  labels:
    app: order-rabbitmq-dev
    environment: dev
spec:
  serviceName: order-rabbitmq-dev
  replicas: 1
  selector:
    matchLabels:
      app: order-rabbitmq-dev
  template:
    metadata:
      labels:
        app: order-rabbitmq-dev
        environment: dev
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: order-service-dev-secret
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: order-service-dev-secret
                  key: RABBITMQ_PASSWORD
          startupProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 5672
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 5672
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: order-rabbitmq-dev-data
---
apiVersion: v1
kind: Service
metadata:
  name: order-rabbitmq-dev
  labels:
    app: order-rabbitmq-dev
    environment: dev
spec:
  type: ClusterIP
  selector:
    app: order-rabbitmq-dev
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
